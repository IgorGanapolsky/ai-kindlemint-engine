# CodeRabbit Configuration
# ULTRA-MINIMAL mode to prevent email spam

# Review Settings
reviews:
  # CRITICAL issues only - no suggestions or nitpicks
  comment_threshold: "critical"
  review_level: "critical_only"
  
  # Disable auto-review for workflows and configs
  ignore_patterns:
    - "*.md"
    - "*.json"
    - "*.yml"
    - "*.yaml"
    - "*.txt"
    - "*.log"
    - "tests/**"
    - "docs/**"
    - "*.test.*"
    - "*.spec.*"
    - ".github/workflows/**"
    - "scripts/**"
    - "reports/**"
    - "config/**"
  
  # Only review ACTUAL bugs
  focus_areas:
    - "security_vulnerabilities"
    - "critical_bugs"
  
  # Skip ALL non-critical checks
  skip_checks:
    - "code_style"
    - "naming_conventions"  
    - "documentation"
    - "whitespace"
    - "line_length"
    - "performance_suggestions"
    - "refactoring_suggestions"
    - "best_practices"
    - "code_smells"

# Summary Settings  
summary:
  # Ultra-concise mode
  style: "ultra_concise"
  enabled: false  # Disable summaries entirely
  
  # Only include critical findings in summary
  include_only_critical: true
  
  # Max length for summary comments
  max_length: 200

# Behavior Settings
behavior:
  # Maximum 1 comment per PR
  file_comment_limit: 1
  pr_comment_limit: 1
  
  # Group ALL issues into single comment
  group_related_issues: true
  
  # Don't re-comment on anything
  skip_resolved: true
  skip_previous_suggestions: true
  
  # Silent mode - only comment on critical issues
  interaction_mode: "silent"
  
  # Don't suggest commands or documentation
  disable_command_suggestions: true
  disable_documentation_links: true

# Language-specific settings
languages:
  python:
    # Focus on actual bugs, not style
    checks:
      - "undefined_variables"
      - "type_errors"
      - "logic_errors"
      - "security_issues"
  
  javascript:
    checks:
      - "undefined_variables"
      - "type_errors"
      - "async_issues"
      - "security_issues"

# Disable features that create noise
disable:
  - "emoji_reactions"
  - "praise_comments"
  - "nitpick_mode"
  - "style_suggestions"
  - "refactoring_suggestions"

# Email notification settings
notifications:
  email: false